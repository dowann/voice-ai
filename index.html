<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: #080810;
    color: #d4d4d8;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    padding: 28px 16px 170px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { max-width: 540px; width: 100%; }
  .header { text-align: center; margin-bottom: 20px; }
  .header small { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #3f3f46; }
  .header h1 { font-size: 19px; font-weight: 500; color: #e4e4e7; margin-top: 5px; }
  .mode-bar {
    display: flex; justify-content: center; gap: 0; margin-bottom: 20px;
    background: rgba(255,255,255,0.03); border-radius: 12px; padding: 3px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .mode-btn {
    flex: 1; padding: 9px 12px; border: none; border-radius: 10px;
    background: transparent; color: #52525b; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.2s; text-align: center;
  }
  .mode-btn.active {
    background: rgba(110,231,183,0.1); color: #6ee7b7;
    box-shadow: 0 2px 8px rgba(110,231,183,0.1);
  }
  .mode-btn .sub { font-size: 9px; display: block; margin-top: 2px; opacity: 0.6; }
  #keySection { margin-bottom: 20px; display: none; }
  #keySection input {
    width: 100%; padding: 12px 14px; background: #111118; border: 1px solid #27272a;
    border-radius: 10px; color: #a1a1aa; font-size: 13px; font-family: inherit; outline: none;
  }
  #keySection input:focus { border-color: #6ee7b7; }
  #keySection .hint { font-size: 10px; color: #52525b; margin-top: 6px; text-align: center; }
  #status {
    text-align: center; font-size: 13px; color: #71717a;
    margin-bottom: 16px; min-height: 20px;
  }
  #status.on { color: #6ee7b7; }
  .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #6ee7b7; margin-right: 8px; animation: blink 1s infinite;
  }
  .speed-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .speed-btn {
    font-size: 10px; padding: 4px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    color: #52525b; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .speed-btn.active { background: rgba(110,231,183,0.08); border-color: rgba(110,231,183,0.2); color: #6ee7b7; }
  .cmds { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
  .cmd {
    font-size: 9px; padding: 3px 8px; border-radius: 16px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #52525b;
  }
  .cmd b { color: #71717a; font-weight: 500; }
  .q-block {
    background: rgba(110,231,183,0.04); border: 1px solid rgba(110,231,183,0.1);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    font-size: 14px; color: #a1a1aa; line-height: 1.5; animation: slideUp 0.3s ease;
  }
  .q-block .label { font-size: 9px; color: #525260; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  #list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .card {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px; padding: 12px 14px; transition: all 0.3s; animation: slideUp 0.25s ease;
  }
  .card.active { background: rgba(110,231,183,0.05); border-color: rgba(110,231,183,0.15); }
  .card .num { font-size: 9px; color: #3f3f46; margin-bottom: 3px; }
  .card .ko { font-size: 11px; color: #71717a; margin-bottom: 4px; }
  .card .text { font-size: 15px; color: #e4e4e7; line-height: 1.55; margin-bottom: 8px; }
  .btns { display: flex; gap: 6px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.05); border: none; border-radius: 7px;
    padding: 5px 11px; color: #a1a1aa; font-size: 10px; cursor: pointer; font-family: inherit;
  }
  .btn:active { transform: scale(0.95); }
  .btn.slow { color: #fbbf24; }
  .btn-x {
    background: none; border: none; padding: 5px 7px; color: #3f3f46;
    font-size: 10px; cursor: pointer; margin-left: auto; font-family: inherit;
  }
  #empty {
    text-align: center; padding: 40px 20px; color: #3f3f46;
    font-size: 13px; line-height: 1.8;
  }
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    padding: 16px; gap: 12px;
    background: linear-gradient(transparent, #080810 35%);
  }
  .mic-btn {
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #e4e4e7, #d4d4d8);
    color: #18181b; font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6); transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .mic-btn.on {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: #fff; box-shadow: 0 0 30px rgba(220,38,38,0.35);
  }
  .clear-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.06); color: #71717a; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <small>voice ai assistant</small>
    <h1>Ask me anything 🎧</h1>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="modeTranslate" onclick="switchMode('translate')">
      🌐 번역<span class="sub">무료 · 한→영</span>
    </button>
    <button class="mode-btn" id="modeAI" onclick="switchMode('ai')">
      🤖 AI<span class="sub">API Key</span>
    </button>
    <button class="mode-btn" id="modePhoto" onclick="switchMode('photo')">
      📷 사진<span class="sub">API Key</span>
    </button>
  </div>
  <div id="keySection">
    <input type="password" id="apiKey" placeholder="Anthropic API Key (sk-ant-...)" oninput="saveKey()">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;">
      <input type="checkbox" id="saveKeyCheck" onchange="toggleSaveKey()" style="width:14px;height:14px;">
      <label for="saveKeyCheck" style="font-size:10px;color:#52525b;cursor:pointer;">키 저장 (이 브라우저에만)</label>
    </div>
    <div class="hint">키는 Anthropic 서버로만 전송됩니다</div>
  </div>
  <div id="status">Tap mic to start</div>
  <div class="speed-bar">
    <button class="speed-btn" onclick="setSpeed(0.6)">Slow</button>
    <button class="speed-btn active" id="speedNormal" onclick="setSpeed(0.9)">Normal</button>
    <button class="speed-btn" onclick="setSpeed(1.2)">Fast</button>
  </div>
  <div class="cmds" id="cmdsArea"></div>
  <div id="conversation"></div>
  <div id="empty">🎤 마이크를 누르고 명령어로 시작하세요<br>번역: "번역" → 말하기 → "끝"<br>AI: "질문" → 영어로 말하기 → "done"<br>사진: "사진" → 키워드 말하기 → "끝"<br><br>🎧 에어팟 하나만 끼고 사용하세요</div>
</div>
<div class="bottom-bar">
  <button class="clear-btn" onclick="clearAll()">🗑</button>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
</div>
<script>
let mode = 'translate';
let apiKey = '';
let listening = false;
let recognition = null;
let speed = 0.9;
let curSentences = [];
let curIdx = -1;
let speaking = false;
let conversationHistory = [];
let waitingForQuestion = false;
let lastQuestion = '';
let translateSentences = [];
let wakeLock = null;
let stopCount = 0;
let stopTimer = null;
let ttsPlaying = false;
let questionBuffer = [];
let waitingForTranslation = false;
let translateBuffer = [];

// --- Wake Lock (keep screen on) ---
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) {}
}
async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && listening) requestWakeLock();
});

function switchMode(m) {
  mode = m;
  document.getElementById('modeTranslate').className = 'mode-btn' + (m === 'translate' ? ' active' : '');
  document.getElementById('modeAI').className = 'mode-btn' + (m === 'ai' ? ' active' : '');
  document.getElementById('modePhoto').className = 'mode-btn' + (m === 'photo' ? ' active' : '');
  document.getElementById('keySection').style.display = (m === 'ai' || m === 'photo') ? 'block' : 'none';
  if (listening) toggleMic();
  clearAll();
  updateCmds();
}

function updateCmds() {
  const a = document.getElementById('cmdsArea');
  if (mode === 'translate') {
    a.innerHTML =
      '<div class="cmd"><b>"번역"</b> 번역 시작 (Ready 후 한국어로 말하기)</div>' +
      '<div class="cmd"><b>"끝"</b> 번역 전송</div>' +
      '<div class="cmd"><b>"다시"</b> 현재 문장 다시 듣기</div>' +
      '<div class="cmd"><b>"다음"</b> 다음 문장 듣기</div>' +
      '<div class="cmd"><b>"N번"</b> N번 문장 듣기</div>' +
      '<div class="cmd"><b>"전체 재생"</b> 전체 문장 재생</div>' +
      '<div class="cmd"><b>"멈춰"</b> 재생 멈춤</div>' +
      '<div class="cmd"><b>"멈춰"x3</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"느리게"</b> 느린 속도로 변경</div>' +
      '<div class="cmd"><b>"보통"</b> 보통 속도로 변경</div>' +
      '<div class="cmd"><b>"빠르게"</b> 빠른 속도로 변경</div>' +
      '<div class="cmd"><b>"리셋"</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"에이아이 모드"</b> AI 모드로 변경</div>' +
      '<div class="cmd"><b>"사진 모드"</b> 사진 설명 모드로 변경</div>';
  } else if (mode === 'ai') {
    a.innerHTML =
      '<div class="cmd"><b>"질문"</b> 질문 시작 (Ready 후 영어로 말하기)</div>' +
      '<div class="cmd"><b>"done"</b> 질문 전송 (영어 인식 중)</div>' +
      '<div class="cmd"><b>"더 답변"</b> 같은 질문에 5문장 추가</div>' +
      '<div class="cmd"><b>"다른 답변"</b> 같은 질문에 다른 답변</div>' +
      '<div class="cmd"><b>"재질문"</b> 같은 질문 다시 질문</div>' +
      '<div class="cmd"><b>"다시"</b> 현재 문장 다시 듣기</div>' +
      '<div class="cmd"><b>"다음"</b> 다음 문장 듣기</div>' +
      '<div class="cmd"><b>"N번"</b> N번 문장 듣기</div>' +
      '<div class="cmd"><b>"전체 재생"</b> 전체 문장 재생</div>' +
      '<div class="cmd"><b>"스타트"</b> 2초 후 천천히 전체 재생</div>' +
      '<div class="cmd"><b>"멈춰"</b> 재생 멈춤</div>' +
      '<div class="cmd"><b>"멈춰"x3</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"느리게"</b> 느린 속도로 변경</div>' +
      '<div class="cmd"><b>"보통"</b> 보통 속도로 변경</div>' +
      '<div class="cmd"><b>"빠르게"</b> 빠른 속도로 변경</div>' +
      '<div class="cmd"><b>"리셋"</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"번역 모드"</b> 번역 모드로 변경</div>' +
      '<div class="cmd"><b>"사진 모드"</b> 사진 설명 모드로 변경</div>';
  } else if (mode === 'photo') {
    a.innerHTML =
      '<div class="cmd"><b>"사진"</b> 사진 설명 시작 (키워드 말하기)</div>' +
      '<div class="cmd"><b>"끝"</b> 설명 전송</div>' +
      '<div class="cmd"><b>"다시"</b> 현재 문장 다시 듣기</div>' +
      '<div class="cmd"><b>"다음"</b> 다음 문장 듣기</div>' +
      '<div class="cmd"><b>"N번"</b> N번 문장 듣기</div>' +
      '<div class="cmd"><b>"전체 재생"</b> 전체 문장 재생</div>' +
      '<div class="cmd"><b>"스타트"</b> 2초 후 천천히 전체 재생</div>' +
      '<div class="cmd"><b>"멈춰"</b> 재생 멈춤</div>' +
      '<div class="cmd"><b>"멈춰"x3</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"더 설명"</b> 설명 추가</div>' +
      '<div class="cmd"><b>"다른 설명"</b> 다르게 설명</div>' +
      '<div class="cmd"><b>"재설명"</b> 같은 키워드로 다시</div>' +
      '<div class="cmd"><b>"느리게"</b> 느린 속도로 변경</div>' +
      '<div class="cmd"><b>"보통"</b> 보통 속도로 변경</div>' +
      '<div class="cmd"><b>"빠르게"</b> 빠른 속도로 변경</div>' +
      '<div class="cmd"><b>"리셋"</b> 전부 초기화</div>' +
      '<div class="cmd"><b>"번역 모드"</b> 번역 모드로 변경</div>' +
      '<div class="cmd"><b>"에이아이 모드"</b> AI 모드로 변경</div>';
  }
}
updateCmds();

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (apiKey.startsWith('sk-ant-')) document.getElementById('keySection').style.opacity = '0.4';
  if (document.getElementById('saveKeyCheck').checked && apiKey) {
    localStorage.setItem('voice-ai-key', apiKey);
  }
}

function toggleSaveKey() {
  if (document.getElementById('saveKeyCheck').checked) {
    if (apiKey) localStorage.setItem('voice-ai-key', apiKey);
  } else {
    localStorage.removeItem('voice-ai-key');
  }
}

function loadSavedKey() {
  const saved = localStorage.getItem('voice-ai-key');
  if (saved) {
    apiKey = saved;
    document.getElementById('apiKey').value = saved;
    document.getElementById('saveKeyCheck').checked = true;
    document.getElementById('keySection').style.opacity = '0.4';
  }
}
loadSavedKey();

function setStatus(text, on) {
  const el = document.getElementById('status');
  el.className = on ? 'on' : '';
  el.innerHTML = (on ? '<span class="dot"></span>' : '') + esc(text);
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (s <= 0.6) document.querySelectorAll('.speed-btn')[0].classList.add('active');
  else if (s >= 1.2) document.querySelectorAll('.speed-btn')[2].classList.add('active');
  else document.getElementById('speedNormal').classList.add('active');
}

function speakSentence(text, idx, rate) {
  speechSynthesis.cancel();
  const spokenText = 'Number ' + (idx + 1) + '. ' + text;
  const u = new SpeechSynthesisUtterance(spokenText);
  u.lang = 'en-US'; u.rate = rate || speed;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (v) u.voice = v;
  u.onstart = () => { speaking = true; ttsPlaying = true; curIdx = idx; updateActive(); };
  u.onend = () => { speaking = false; ttsPlaying = false; updateActive(); if (listening) { setStatus('🔒 대기 중...', true); }};
  speechSynthesis.speak(u);
}

function playAll() {
  if (!curSentences.length) return;
  speechSynthesis.cancel();
  ttsPlaying = true;
  let i = 0;
  function next() {
    if (i >= curSentences.length) { speaking = false; ttsPlaying = false; updateActive(); return; }
    const idx = i;
    const u = new SpeechSynthesisUtterance('Number ' + (idx + 1) + '. ' + curSentences[i]);
    u.lang = 'en-US'; u.rate = speed;
    u.onstart = () => { speaking = true; curIdx = idx; updateActive(); };
    u.onend = () => { i++; next(); };
    speechSynthesis.speak(u);
  }
  next();
}

// --- Slow Start (2초 후 천천히 전체 재생) ---
function slowStart() {
  if (!curSentences.length) { voiceFeedback('No sentences.'); return; }
  speechSynthesis.cancel(); speaking = false;
  voiceFeedback('Complete.');
  setTimeout(() => {
    ttsPlaying = true;
    let i = 0;
    function next() {
      if (i >= curSentences.length) { speaking = false; ttsPlaying = false; updateActive(); return; }
      const idx = i;
      const u = new SpeechSynthesisUtterance('Number ' + (idx + 1) + '. ' + curSentences[i]);
      u.lang = 'en-US'; u.rate = 0.6;
      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
        || voices.find(v => v.lang === 'en-US')
        || voices.find(v => v.lang.startsWith('en'));
      if (v) u.voice = v;
      u.onstart = () => { speaking = true; curIdx = idx; updateActive(); };
      u.onend = () => { i++; next(); };
      speechSynthesis.speak(u);
    }
    next();
  }, 2000);
}

// --- Voice feedback ---
function voiceFeedback(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 1; u.volume = 0.6;
  speechSynthesis.speak(u);
}

// ---- TRANSLATE ----
function checkTranslateCmd(text) {
  const t = text.trim();
  if (['번역','번역하기'].includes(t)) return 'startTranslate';
  const map = { '다시':'replay','한번 더':'replay','다음':'next','멈춰':'stop','그만':'stop','정지':'stop','리셋':'clear','느리게':'slow','천천히':'slow','보통':'normal','빠르게':'fast','빨리':'fast','전체 재생':'playall','전체재생':'playall','다 들려줘':'playall','에이아이 모드':'switchAI','AI 모드':'switchAI','사진 모드':'switchPhoto','사진모드':'switchPhoto' };
  if (map[t]) return map[t];
  if (t.toLowerCase().includes('ai mode') || t.toLowerCase().includes('ai 모드')) return 'switchAI';
  const m = t.match(/^(\d+)\s*번/);
  if (m) return 'play:' + (parseInt(m[1]) - 1);
  return null;
}

function runTranslateCmd(cmd) {
  if (cmd === 'startTranslate') { speechSynthesis.cancel(); speaking = false; translateBuffer = []; setStatus('🎤 한국어로 말하세요... "끝" 하면 번역', true); const r = new SpeechSynthesisUtterance('Ready.'); r.lang = 'en-US'; r.rate = 1; r.volume = 0.6; r.onend = () => { waitingForTranslation = true; }; speechSynthesis.speak(r); return; }
  if (cmd === 'switchAI') { if (listening) toggleMic(); switchMode('ai'); voiceFeedback('AI mode.'); setTimeout(() => toggleMic(), 1000); return; }
  if (cmd === 'switchPhoto') { if (listening) toggleMic(); switchMode('photo'); voiceFeedback('Photo mode.'); setTimeout(() => toggleMic(), 1000); return; }
  if (cmd === 'replay') { const i = curIdx >= 0 ? curIdx : curSentences.length - 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'next') { const i = curIdx + 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'stop') { speechSynthesis.cancel(); speaking = false; updateActive(); voiceFeedback('Complete.'); stopCount++; if (stopTimer) clearTimeout(stopTimer); stopTimer = setTimeout(() => { stopCount = 0; }, 5000); if (stopCount >= 3) { stopCount = 0; clearAll(); voiceFeedback('Cleared.'); return; } }
  else if (cmd === 'clear') { clearAll(); voiceFeedback('Complete.'); }
  else if (cmd === 'slow') { setSpeed(0.6); voiceFeedback('Complete.'); }
  else if (cmd === 'normal') { setSpeed(0.9); voiceFeedback('Complete.'); }
  else if (cmd === 'fast') { setSpeed(1.2); voiceFeedback('Complete.'); }
  else if (cmd === 'playall') { playAll(); }
  else if (cmd.startsWith('play:')) { const i = parseInt(cmd.split(':')[1]); if (curSentences[i]) speakSentence(curSentences[i], i); }
}

async function translateText(text) {
  setStatus('"' + text + '" — translating...', true);
  try {
    const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ko|en');
    const data = await res.json();
    let tr = data.responseData?.translatedText || '';
    if (!tr || tr === text) { setStatus('Translation failed', false); return; }
    if (tr === tr.toUpperCase() && tr.length > 3) tr = tr.charAt(0) + tr.slice(1).toLowerCase();
    translateSentences.push({ ko: text, en: tr });
    curSentences = translateSentences.map(s => s.en);
    curIdx = curSentences.length - 1;
    renderTranslation();
    speakSentence(tr, curIdx);
  } catch (e) { setStatus('Translation error', false); }
}

function removeTranslation(i) {

// ---- AI ----
function checkAICmd(text) {
  const t = text.trim();
  const tl = t.toLowerCase();
  // Korean commands
  if (['질문'].includes(t)) return 'ask';
  if (['번역 모드','번역모드'].includes(t)) return 'switchTranslate';
  if (['사진 모드','사진모드'].includes(t)) return 'switchPhoto';
  if (['다시','한번 더','리플레이'].includes(t)) return 'replay';
  if (t === '다음') return 'next';
  if (['멈춰','그만','정지'].includes(t)) return 'stop';
  if (['리셋'].includes(t)) return 'clear';
  if (['느리게','천천히'].includes(t)) return 'slow';
  if (t === '보통') return 'normal';
  if (['빠르게','빨리'].includes(t)) return 'fast';
  if (['전체 재생','전체재생','다 들려줘'].includes(t)) return 'playall';
  if (['스타트','시작'].includes(t)) return 'slowstart';
  if (['다시 질문','재질문','리트라이'].includes(t)) return 'retry';
  if (t.includes('더 답변') || t.includes('추가 답변') || t.includes('더 말해')) return 'more';
  if (t.includes('다른 답변') || t.includes('다르게')) return 'another';
  const m = t.match(/^(\d+)\s*번/);
  if (m) return 'play:' + (parseInt(m[1]) - 1);
  return null;
}

function runAICmd(cmd) {
  if (cmd === 'switchTranslate') { if (listening) toggleMic(); switchMode('translate'); voiceFeedback('Translate mode.'); setTimeout(() => toggleMic(), 1000); return; }
  if (cmd === 'switchPhoto') { if (listening) toggleMic(); switchMode('photo'); voiceFeedback('Photo mode.'); setTimeout(() => toggleMic(), 1000); return; }
  if (cmd === 'ask') { speechSynthesis.cancel(); speaking = false; questionBuffer = []; setStatus('🎤 영어로 질문하세요... "done" 하면 전송', true); const r = new SpeechSynthesisUtterance('Ready.'); r.lang = 'en-US'; r.rate = 1; r.volume = 0.6; r.onend = () => { waitingForQuestion = true; if (listening && recognition) { recognition.stop(); recognition.lang = 'en-US'; try { recognition.start(); } catch {} } }; speechSynthesis.speak(r); return; }
  if (cmd === 'retry') { voiceFeedback('Complete.'); if (lastQuestion) { speechSynthesis.cancel(); speaking = false; if (conversationHistory.length >= 2) { conversationHistory.pop(); conversationHistory.pop(); } askClaude(lastQuestion); } return; }
  if (cmd === 'more') { voiceFeedback('Complete.'); if (lastQuestion) { moreAnswer(); } return; }
  if (cmd === 'another') { voiceFeedback('Complete.'); if (lastQuestion) { anotherAnswer(); } return; }
  if (cmd === 'slowstart') { slowStart(); return; }
  if (cmd === 'replay') { const i = curIdx >= 0 ? curIdx : curSentences.length - 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'next') { const i = curIdx + 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'stop') { speechSynthesis.cancel(); speaking = false; updateActive(); voiceFeedback('Complete.'); stopCount++; if (stopTimer) clearTimeout(stopTimer); stopTimer = setTimeout(() => { stopCount = 0; }, 5000); if (stopCount >= 3) { stopCount = 0; clearAll(); voiceFeedback('Cleared.'); return; } }
  else if (cmd === 'clear') { clearAll(); voiceFeedback('Complete.'); }
  else if (cmd === 'slow') { setSpeed(0.6); voiceFeedback('Complete.'); }
  else if (cmd === 'normal') { setSpeed(0.9); voiceFeedback('Complete.'); }
  else if (cmd === 'fast') { setSpeed(1.2); voiceFeedback('Complete.'); }
  else if (cmd === 'playall') { playAll(); }
  else if (cmd.startsWith('play:')) { const i = parseInt(cmd.split(':')[1]); if (curSentences[i]) speakSentence(curSentences[i], i); }
}

function splitSentences(text) {
  return text.match(/[^.!?]+[.!?]+|[^.!?]+$/g)?.map(s => s.trim()).filter(s => s.length > 0) || [text];
}

// ---- MIC ----
function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (listening) { recognition?.stop(); listening = false; btn.className = 'mic-btn'; btn.textContent = '🎤'; setStatus('Stopped', false); releaseWakeLock(); return; }
  if ((mode === 'ai' || mode === 'photo') && !apiKey) { setStatus('Enter API key first', false); document.getElementById('apiKey').focus(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Speech recognition not supported', false); return; }
  requestWakeLock();
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const last = e.results[e.results.length - 1];
    if (last.isFinal) {
      const text = last[0].transcript.trim();
      if (!text) return;
      
      // During TTS, only accept stop commands
      if (ttsPlaying) {
        const t = text.toLowerCase().trim();
        if (['stop','pause','멈춰','그만','정지'].includes(t)) {
          speechSynthesis.cancel(); speaking = false; ttsPlaying = false; updateActive();
          stopCount++;
          if (stopTimer) clearTimeout(stopTimer);
          stopTimer = setTimeout(() => { stopCount = 0; }, 5000);
          if (stopCount >= 3) { stopCount = 0; clearAll(); voiceFeedback('Cleared.'); return; }
          setStatus('🔒 대기 중...', true);
        }
        return;
      }
      
      if (mode === 'translate') {
        if (waitingForTranslation) {
          const cleaned = text.replace(/끝$/,'').replace(/끝이요$/,'').replace(/끝이에요$/,'').trim();
          if (cleaned) translateBuffer.push(cleaned);
          if (text.includes('끝')) {
            waitingForTranslation = false;
            const fullText = translateBuffer.join(' ');
            translateBuffer = [];
            if (fullText) {
              voiceFeedback('Complete.');
              translateText(fullText);
            }
            setStatus('🔒 대기 중...', true);
          } else {
            setStatus('🎤 계속 말하세요... "끝" 하면 번역 (' + translateBuffer.length + ')', true);
          }
          return;
        }
        const cmd = checkTranslateCmd(text);
        if (cmd) { runTranslateCmd(cmd); if (!waitingForTranslation) setStatus('🔒 대기 중...', true); }
        else { voiceFeedback('Command not recognized.'); setStatus('🔒 대기 중...', true); }
      } else if (mode === 'ai') {
        if (waitingForQuestion) {
          const tl = text.toLowerCase().trim();
          const isDone = tl === 'done' || tl === 'done.' || tl.endsWith(' done') || tl.endsWith(' done.');
          const cleaned = text.replace(/\s*done\.?\s*$/i, '').trim();
          if (cleaned) questionBuffer.push(cleaned);
          
          if (isDone) {
            waitingForQuestion = false;
            const fullQuestion = questionBuffer.join(' ');
            questionBuffer = [];
            if (listening && recognition) { recognition.stop(); recognition.lang = 'ko-KR'; try { recognition.start(); } catch {} }
            if (fullQuestion) {
              lastQuestion = fullQuestion;
              setStatus('🔒 대기 중...', true);
              voiceFeedback('Complete.');
              askClaude(fullQuestion);
            } else {
              setStatus('🔒 대기 중...', true);
            }
          } else {
            setStatus('🎤 계속 말하세요... "done" 하면 전송 (' + questionBuffer.length + ')', true);
          }
          return;
        }
        const cmd = checkAICmd(text);
        if (cmd) { runAICmd(cmd); if (!waitingForQuestion) setStatus('🔒 대기 중...', true); }
        else { voiceFeedback('Command not recognized.'); setStatus('🔒 대기 중...', true); }
      } else if (mode === 'photo') {
        if (waitingForPhoto) {
          const cleaned = text.replace(/끝$/,'').replace(/끝이요$/,'').replace(/끝이에요$/,'').trim();
          if (cleaned) photoBuffer.push(cleaned);
          if (text.includes('끝')) {
            waitingForPhoto = false;
            const fullKeywords = photoBuffer.join(', ');
            photoBuffer = [];
            if (fullKeywords) {
              lastPhotoKeywords = fullKeywords;
              setStatus('🔒 대기 중...', true);
              voiceFeedback('Complete.');
              askPhotoDescription(fullKeywords);
            } else {
              setStatus('🔒 대기 중...', true);
            }
          } else {
            setStatus('🎤 키워드 계속... "끝" 하면 생성 (' + photoBuffer.length + ')', true);
          }
          return;
        }
        const cmd = checkPhotoCmd(text);
        if (cmd) { runPhotoCmd(cmd); if (!waitingForPhoto) setStatus('🔒 대기 중...', true); }
        else { voiceFeedback('Command not recognized.'); setStatus('🔒 대기 중...', true); }
      }
    }
  };
  recognition.onstart = () => { listening = true; btn.className = 'mic-btn on'; btn.textContent = '■'; setStatus('🔒 대기 중...', true); };
  recognition.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') setStatus('Error: ' + e.error, false); };
  recognition.onend = () => { if (listening) { try { recognition.start(); } catch {} } };
  recognition.start();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc2(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
