<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: #080810;
    color: #d4d4d8;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    padding: 28px 16px 170px;
    display: flex; flex-direction: column; align-items: center;
  }
  .wrap { max-width: 540px; width: 100%; }
  .header { text-align: center; margin-bottom: 20px; }
  .header small { font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #3f3f46; }
  .header h1 { font-size: 19px; font-weight: 500; color: #e4e4e7; margin-top: 5px; }
  .mode-bar {
    display: flex; justify-content: center; gap: 0; margin-bottom: 20px;
    background: rgba(255,255,255,0.03); border-radius: 12px; padding: 3px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .mode-btn {
    flex: 1; padding: 9px 12px; border: none; border-radius: 10px;
    background: transparent; color: #52525b; font-size: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.2s; text-align: center;
  }
  .mode-btn.active {
    background: rgba(110,231,183,0.1); color: #6ee7b7;
    box-shadow: 0 2px 8px rgba(110,231,183,0.1);
  }
  .mode-btn .sub { font-size: 9px; display: block; margin-top: 2px; opacity: 0.6; }
  #keySection { margin-bottom: 20px; display: none; }
  #keySection input {
    width: 100%; padding: 12px 14px; background: #111118; border: 1px solid #27272a;
    border-radius: 10px; color: #a1a1aa; font-size: 13px; font-family: inherit; outline: none;
  }
  #keySection input:focus { border-color: #6ee7b7; }
  #keySection .hint { font-size: 10px; color: #52525b; margin-top: 6px; text-align: center; }
  #status {
    text-align: center; font-size: 13px; color: #71717a;
    margin-bottom: 16px; min-height: 20px;
  }
  #status.on { color: #6ee7b7; }
  .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #6ee7b7; margin-right: 8px; animation: blink 1s infinite;
  }
  .speed-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .speed-btn {
    font-size: 10px; padding: 4px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
    color: #52525b; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .speed-btn.active { background: rgba(110,231,183,0.08); border-color: rgba(110,231,183,0.2); color: #6ee7b7; }
  .cmds { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
  .cmd {
    font-size: 9px; padding: 3px 8px; border-radius: 16px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #52525b;
  }
  .cmd b { color: #71717a; font-weight: 500; }
  .q-block {
    background: rgba(110,231,183,0.04); border: 1px solid rgba(110,231,183,0.1);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    font-size: 14px; color: #a1a1aa; line-height: 1.5; animation: slideUp 0.3s ease;
  }
  .q-block .label { font-size: 9px; color: #525260; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  #list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .card {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px; padding: 12px 14px; transition: all 0.3s; animation: slideUp 0.25s ease;
  }
  .card.active { background: rgba(110,231,183,0.05); border-color: rgba(110,231,183,0.15); }
  .card .num { font-size: 9px; color: #3f3f46; margin-bottom: 3px; }
  .card .ko { font-size: 11px; color: #71717a; margin-bottom: 4px; }
  .card .text { font-size: 15px; color: #e4e4e7; line-height: 1.55; margin-bottom: 8px; }
  .btns { display: flex; gap: 6px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.05); border: none; border-radius: 7px;
    padding: 5px 11px; color: #a1a1aa; font-size: 10px; cursor: pointer; font-family: inherit;
  }
  .btn:active { transform: scale(0.95); }
  .btn.slow { color: #fbbf24; }
  .btn-x {
    background: none; border: none; padding: 5px 7px; color: #3f3f46;
    font-size: 10px; cursor: pointer; margin-left: auto; font-family: inherit;
  }
  #empty {
    text-align: center; padding: 40px 20px; color: #3f3f46;
    font-size: 13px; line-height: 1.8;
  }
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    padding: 16px; gap: 12px;
    background: linear-gradient(transparent, #080810 35%);
  }
  .mic-btn {
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #e4e4e7, #d4d4d8);
    color: #18181b; font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6); transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .mic-btn.on {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: #fff; box-shadow: 0 0 30px rgba(220,38,38,0.35);
  }
  .clear-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.06); color: #71717a; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <small>voice ai assistant</small>
    <h1>Ask me anything 🎧</h1>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="modeTranslate" onclick="switchMode('translate')">
      🌐 Translate<span class="sub">무료 · 한→영</span>
    </button>
    <button class="mode-btn" id="modeAI" onclick="switchMode('ai')">
      🤖 AI Answer<span class="sub">API Key 필요</span>
    </button>
  </div>
  <div id="keySection">
    <input type="password" id="apiKey" placeholder="Anthropic API Key (sk-ant-...)" oninput="saveKey()">
    <div class="hint">Key is stored in memory only — never sent anywhere except Anthropic</div>
  </div>
  <div id="status">Tap mic to start</div>
  <div class="speed-bar">
    <button class="speed-btn" onclick="setSpeed(0.6)">Slow</button>
    <button class="speed-btn active" id="speedNormal" onclick="setSpeed(0.9)">Normal</button>
    <button class="speed-btn" onclick="setSpeed(1.2)">Fast</button>
  </div>
  <div class="cmds" id="cmdsArea"></div>
  <div id="conversation"></div>
  <div id="empty">🎤 Tap the mic and speak<br>🎧 Use one AirPod for best experience</div>
</div>
<div class="bottom-bar">
  <button class="clear-btn" onclick="clearAll()">🗑</button>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
</div>
<script>
let mode = 'translate';
let apiKey = '';
let listening = false;
let recognition = null;
let speed = 0.9;
let curSentences = [];
let curIdx = -1;
let speaking = false;
let conversationHistory = [];
let waitingForQuestion = false;
let lastQuestion = '';
let translateSentences = [];

function switchMode(m) {
  mode = m;
  document.getElementById('modeTranslate').className = 'mode-btn' + (m === 'translate' ? ' active' : '');
  document.getElementById('modeAI').className = 'mode-btn' + (m === 'ai' ? ' active' : '');
  document.getElementById('keySection').style.display = m === 'ai' ? 'block' : 'none';
  if (listening) toggleMic();
  clearAll();
  updateCmds();
}

function updateCmds() {
  const a = document.getElementById('cmdsArea');
  if (mode === 'translate') {
    a.innerHTML =
      '<div class="cmd"><b>"다시"</b> replay</div>' +
      '<div class="cmd"><b>"다음"</b> next</div>' +
      '<div class="cmd"><b>"N번"</b> play #</div>' +
      '<div class="cmd"><b>"멈춰"</b> stop</div>' +
      '<div class="cmd"><b>"느리게"</b> slow</div>' +
      '<div class="cmd"><b>"지워"</b> clear</div>';
  } else {
    a.innerHTML =
      '<div class="cmd"><b>"question"</b> start</div>' +
      '<div class="cmd"><b>"retry"</b> re-ask</div>' +
      '<div class="cmd"><b>"again"</b> replay</div>' +
      '<div class="cmd"><b>"next"</b> next</div>' +
      '<div class="cmd"><b>"number N"</b> play #</div>' +
      '<div class="cmd"><b>"stop"</b> stop</div>' +
      '<div class="cmd"><b>"slow"</b> slow</div>' +
      '<div class="cmd"><b>"clear"</b> clear</div>';
  }
}
updateCmds();

function saveKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (apiKey.startsWith('sk-ant-')) document.getElementById('keySection').style.opacity = '0.4';
}

function setStatus(text, on) {
  const el = document.getElementById('status');
  el.className = on ? 'on' : '';
  el.innerHTML = (on ? '<span class="dot"></span>' : '') + esc(text);
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (s <= 0.6) document.querySelectorAll('.speed-btn')[0].classList.add('active');
  else if (s >= 1.2) document.querySelectorAll('.speed-btn')[2].classList.add('active');
  else document.getElementById('speedNormal').classList.add('active');
}

function speakSentence(text, idx, rate) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate || speed;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (v) u.voice = v;
  u.onstart = () => { speaking = true; curIdx = idx; updateActive(); };
  u.onend = () => { speaking = false; updateActive(); if (listening) { if (mode==='translate') setStatus('Listening...', true); else setStatus('🔒 Waiting for command...', true); }};
  speechSynthesis.speak(u);
}

function playAll() {
  if (!curSentences.length) return;
  speechSynthesis.cancel();
  let i = 0;
  function next() {
    if (i >= curSentences.length) { speaking = false; updateActive(); return; }
    const u = new SpeechSynthesisUtterance(curSentences[i]);
    u.lang = 'en-US'; u.rate = speed;
    const idx = i;
    u.onstart = () => { speaking = true; curIdx = idx; updateActive(); };
    u.onend = () => { i++; next(); };
    speechSynthesis.speak(u);
  }
  next();
}

// ---- TRANSLATE ----
function checkTranslateCmd(text) {
  const t = text.trim();
  const map = { '다시':'replay','한번 더':'replay','다음':'next','멈춰':'stop','그만':'stop','정지':'stop','지워':'clear','초기화':'clear','삭제':'clear','느리게':'slow','천천히':'slow','보통':'normal','빠르게':'fast','빨리':'fast' };
  if (map[t]) return map[t];
  const m = t.match(/^(\d+)\s*번/);
  if (m) return 'play:' + (parseInt(m[1]) - 1);
  return null;
}

function runTranslateCmd(cmd) {
  if (cmd === 'replay') { const i = curIdx >= 0 ? curIdx : curSentences.length - 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'next') { const i = curIdx + 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'stop') { speechSynthesis.cancel(); speaking = false; updateActive(); }
  else if (cmd === 'clear') { clearAll(); }
  else if (cmd === 'slow') { setSpeed(0.6); }
  else if (cmd === 'normal') { setSpeed(0.9); }
  else if (cmd === 'fast') { setSpeed(1.2); }
  else if (cmd.startsWith('play:')) { const i = parseInt(cmd.split(':')[1]); if (curSentences[i]) speakSentence(curSentences[i], i); }
}

async function translateText(text) {
  setStatus('"' + text + '" — translating...', true);
  try {
    const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ko|en');
    const data = await res.json();
    let tr = data.responseData?.translatedText || '';
    if (!tr || tr === text) { setStatus('Translation failed', false); return; }
    if (tr === tr.toUpperCase() && tr.length > 3) tr = tr.charAt(0) + tr.slice(1).toLowerCase();
    translateSentences.push({ ko: text, en: tr });
    curSentences = translateSentences.map(s => s.en);
    curIdx = curSentences.length - 1;
    renderTranslation();
    speakSentence(tr, curIdx);
  } catch (e) { setStatus('Translation error', false); }
}

function renderTranslation() {
  const conv = document.getElementById('conversation');
  document.getElementById('empty').style.display = 'none';
  let html = '<div id="list">';
  translateSentences.forEach((s, i) => {
    html += '<div class="card' + (i === curIdx && speaking ? ' active' : '') + '" id="c' + i + '">' +
      '<div class="num">#' + (i+1) + '</div><div class="ko">' + esc(s.ko) + '</div><div class="text">' + esc(s.en) + '</div>' +
      '<div class="btns"><button class="btn" onclick="speakSentence(\'' + esc2(s.en) + '\',' + i + ')">▶</button>' +
      '<button class="btn slow" onclick="speakSentence(\'' + esc2(s.en) + '\',' + i + ',0.5)">🐢</button>' +
      '<button class="btn" onclick="copyText(\'' + esc2(s.en) + '\')">Copy</button>' +
      '<button class="btn-x" onclick="removeTranslation(' + i + ')">✕</button></div></div>';
  });
  html += '</div>';
  if (translateSentences.length > 1) html += '<button id="playAll" style="display:block;width:100%;padding:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:10px;color:#71717a;font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:14px;" onclick="playAll()">▶ Play All</button>';
  conv.innerHTML = html;
}

function removeTranslation(i) {
  if (i === curIdx) { speechSynthesis.cancel(); speaking = false; }
  translateSentences.splice(i, 1);
  curSentences = translateSentences.map(s => s.en);
  if (curIdx >= curSentences.length) curIdx = curSentences.length - 1;
  if (translateSentences.length === 0) { document.getElementById('conversation').innerHTML = ''; document.getElementById('empty').style.display = 'block'; }
  else renderTranslation();
}

// ---- AI ----
function checkAICmd(text) {
  const t = text.toLowerCase().trim();
  if (t === 'question') return 'ask';
  if (['retry','try again','one more time'].includes(t)) return 'retry';
  if (['again','replay','repeat'].includes(t)) return 'replay';
  if (t === 'next') return 'next';
  if (['stop','pause'].includes(t)) return 'stop';
  if (['clear','reset'].includes(t)) return 'clear';
  if (['slow','slowly','slower'].includes(t)) return 'slow';
  if (['normal','normal speed'].includes(t)) return 'normal';
  if (['fast','faster','quickly'].includes(t)) return 'fast';
  if (t === 'play all') return 'playall';
  const m = t.match(/^(?:number|sentence)\s*(\d+)$/);
  if (m) return 'play:' + (parseInt(m[1]) - 1);
  return null;
}

function runAICmd(cmd) {
  if (cmd === 'ask') { waitingForQuestion = true; speechSynthesis.cancel(); speaking = false; setStatus('🎤 Ask your question now...', true); return; }
  if (cmd === 'retry') { if (lastQuestion) { speechSynthesis.cancel(); speaking = false; if (conversationHistory.length >= 2) { conversationHistory.pop(); conversationHistory.pop(); } askClaude(lastQuestion); } return; }
  if (cmd === 'replay') { const i = curIdx >= 0 ? curIdx : curSentences.length - 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'next') { const i = curIdx + 1; if (curSentences[i]) speakSentence(curSentences[i], i); }
  else if (cmd === 'stop') { speechSynthesis.cancel(); speaking = false; updateActive(); }
  else if (cmd === 'clear') { clearAll(); }
  else if (cmd === 'slow') { setSpeed(0.6); }
  else if (cmd === 'normal') { setSpeed(0.9); }
  else if (cmd === 'fast') { setSpeed(1.2); }
  else if (cmd === 'playall') { playAll(); }
  else if (cmd.startsWith('play:')) { const i = parseInt(cmd.split(':')[1]); if (curSentences[i]) speakSentence(curSentences[i], i); }
}

function splitSentences(text) {
  return text.match(/[^.!?]+[.!?]+|[^.!?]+$/g)?.map(s => s.trim()).filter(s => s.length > 0) || [text];
}

async function askClaude(question) {
  if (!apiKey) { setStatus('Enter API key first', false); return; }
  setStatus('Thinking...', true);
  conversationHistory.push({ role: 'user', content: question });
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1024,
        system: 'You are an English-speaking AI. Rules: 1) Answer in EXACTLY 5 sentences. No more, no less. 2) Use only simple, everyday English words. Avoid difficult or academic vocabulary. 3) Give ONLY your direct answer or opinion. No greetings, no filler, no "That\'s a great question", no introductions. Just the answer. 4) Speak naturally like a real person having a conversation. 5) At least ONE sentence MUST include an example. Choose the best style for the situation: sometimes a personal experience like "I remember when..." or "Last time I...", sometimes a general example like "For example,..." or "Like,...". Make it sound natural and believable.',
        messages: conversationHistory.slice(-10),
      }),
    });
    const data = await res.json();
    if (data.error) { setStatus('API error: ' + (data.error.message || 'unknown'), false); conversationHistory.pop(); return; }
    const answer = (data.content || []).map(b => b.text || '').join('');
    conversationHistory.push({ role: 'assistant', content: answer });
    curSentences = splitSentences(answer);
    curIdx = -1;
    renderAI(question, curSentences);
    playAll();
  } catch (e) { setStatus('Network error', false); conversationHistory.pop(); }
}

function renderAI(question, sentences) {
  const conv = document.getElementById('conversation');
  document.getElementById('empty').style.display = 'none';
  let html = '<div class="q-block"><div class="label">You</div>' + esc(question) + '</div><div id="list">';
  sentences.forEach((s, i) => {
    html += '<div class="card" id="c' + i + '"><div class="num">#' + (i+1) + '</div><div class="text">' + esc(s) + '</div>' +
      '<div class="btns"><button class="btn" onclick="speakSentence(\'' + esc2(s) + '\',' + i + ')">▶</button>' +
      '<button class="btn slow" onclick="speakSentence(\'' + esc2(s) + '\',' + i + ',0.5)">🐢</button>' +
      '<button class="btn" onclick="copyText(\'' + esc2(s) + '\')">Copy</button></div></div>';
  });
  html += '</div>';
  if (sentences.length > 1) html += '<button id="playAll" style="display:block;width:100%;padding:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:10px;color:#71717a;font-size:11px;cursor:pointer;font-family:inherit;margin-bottom:14px;" onclick="playAll()">▶ Play All</button>';
  conv.innerHTML = html;
}

// ---- SHARED ----
function updateActive() {
  curSentences.forEach((_, i) => {
    const el = document.getElementById('c' + i);
    if (el) el.className = 'card' + (i === curIdx && speaking ? ' active' : '');
  });
}

function clearAll() {
  speechSynthesis.cancel(); speaking = false; curSentences = []; curIdx = -1;
  conversationHistory = []; translateSentences = []; waitingForQuestion = false; lastQuestion = '';
  document.getElementById('conversation').innerHTML = '';
  document.getElementById('empty').style.display = 'block';
  setStatus('Cleared', false);
}

function copyText(t) { navigator.clipboard.writeText(t).catch(() => {}); }

// ---- MIC ----
function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (listening) { recognition?.stop(); listening = false; btn.className = 'mic-btn'; btn.textContent = '🎤'; setStatus('Stopped', false); return; }
  if (mode === 'ai' && !apiKey) { setStatus('Enter API key first', false); document.getElementById('apiKey').focus(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Speech recognition not supported', false); return; }
  recognition = new SR();
  recognition.lang = mode === 'translate' ? 'ko-KR' : 'en-US';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const last = e.results[e.results.length - 1];
    if (last.isFinal) {
      const text = last[0].transcript.trim();
      if (!text) return;
      if (mode === 'translate') {
        const cmd = checkTranslateCmd(text);
        if (cmd) { runTranslateCmd(cmd); setStatus('Listening...', true); }
        else translateText(text);
      } else {
        if (waitingForQuestion) { waitingForQuestion = false; lastQuestion = text; setStatus('🔒 Waiting for command...', true); askClaude(text); return; }
        const cmd = checkAICmd(text);
        if (cmd) { runAICmd(cmd); if (!waitingForQuestion) setStatus('🔒 Waiting for command...', true); }
      }
    }
  };
  recognition.onstart = () => { listening = true; btn.className = 'mic-btn on'; btn.textContent = '■'; if (mode === 'translate') setStatus('Listening...', true); else setStatus('🔒 Waiting for command...', true); };
  recognition.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') setStatus('Error: ' + e.error, false); };
  recognition.onend = () => { if (listening) { try { recognition.start(); } catch {} } };
  recognition.start();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc2(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
</html>
